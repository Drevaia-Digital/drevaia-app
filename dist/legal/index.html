<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marco Legal — Drevaia Digital</title>

<link rel="stylesheet" href="/css/drevaia.css">

<style>
body{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  color:#eee;
  line-height:1.7;
}

h1,h2{
  color:#d4b08c;
}

.section{
  margin-bottom:30px;
}
</style>

</head>

<body>

<h1>Marco Legal — Drevaia Digital</h1>

<div id="legal-content"></div>

<script>

async function loadLegal(){

  const lang = document.documentElement.lang || "es";

  try{

    const res = await fetch(`/legal/legal-${lang}.json`);
    const data = await res.json();

    const container = document.getElementById("legal-content");

    // PRIVACY
    let html = `<h2>${data.privacy.title}</h2>`;

    data.privacy.sections.forEach(sec=>{
      html += `
        <div class="section">
          <h3>${sec.title}</h3>
          <p>${sec.content}</p>
        </div>
      `;
    });

    // COOKIES
    html += `<h2>${data.cookies.title}</h2>`;

    data.cookies.sections.forEach(sec=>{
      html += `
        <div class="section">
          <h3>${sec.title}</h3>
          <p>${sec.content}</p>
        </div>
      `;
    });

    // REFUNDS
    html += `<h2>${data.refunds.title}</h2>`;

    data.refunds.sections.forEach(sec=>{
      html += `
        <div class="section">
          <h3>${sec.title}</h3>
          <p>${sec.content}</p>
        </div>
      `;
    });

    container.innerHTML = html;

  }catch(e){
    console.error("Error cargando legal:", e);
  }

}

loadLegal();

</script>

</body>
</html>
